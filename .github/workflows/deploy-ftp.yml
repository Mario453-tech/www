name: Deploy via FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Upload to FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for changed-files detection

      - name: Write .env from secret
        run: printf '%s' "$ENV_FILE" > .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port:     ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir:  ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            **/.claude/**
            **/.phpunit_cache/**
            **/.idea/**
            **/tests/**
            **/vendor/**
            **/node_modules/**
            **/cache/**
            **/coverage/**
            **/build/**
            **/dist/**
            **/tmp/**
            **/temp/**
            **/backups/**
            **/svn_repo/**
            **/migrations/**
            **/backup/**
            **/sessions/**
            **/.env.*
            **/.gitignore
            **/composer.json
            **/composer.lock
            **/phpstan.neon
            **/phpstan_errors.txt
            **/phpunit.xml.dist
            **/deploy.ps1
            **/diag*.php
            **/check_log_cfg.php
            **/diag.php
            **/reset_db.php
            **/*.bak
            **/*_server.php
            **/*.log
            **/winscp.log
            **/winscp_sync.txt
            **/*.sql
            **/*.zip
            **/*.rar
            **/database.php
